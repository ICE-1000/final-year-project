<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="login-page bg-im6">
    <main class="login-shell">
        <section class="login-panel">
            <div class="login-logo">
                <img class="logo-image" src="images/logo.png" alt="Logo"
                     onerror="this.onerror=null;this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCAxODAgODAiPjxkZWZzPjxzdHlsZT4uY2gge2ZpbGw6I2ZmZjAwMDt9PC9zdHlsZT48L2RlZnM+PHJlY3Qgd2lkdGg9IjE4MCIgaGVpZ2h0PSI4MCIgY2xhc3M9ImNoIiBmaWxsPSIjZmZmIi8+PHRleHQgeD0iOTAiIHk9IjQ1IiBmb250LXNpemU9IjI0IiBmb250LWZhbWlseT0iQXJpYWwiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiMwOTY2NzAiPkxPR088L3RleHQ+PC9zdmc+'"/>
                <!-- Fallback icon (uncomment if you prefer an icon):
                <i class="fa-solid fa-box-open" style="font-size:48px;color:var(--accent);"></i>
                -->
            </div>
            <h1>Inventory Management System</h1>
            <form id="loginForm" class="form-stack">
                <label>Username <input type="text" id="username" autocomplete="username" required></label>
                <label>Password <input type="password" id="password" autocomplete="current-password" required></label>
                <button type="submit"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
                <p id="errorMsg" class="error"></p>
            </form>
        </section>
    </main>
    <script src="js/auth.js"></script>
</body>
</html>
