<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allocation</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-im1">
<div class="app-layout">
    <aside class="sidebar">
        <div class="logo">IMS</div>
        <nav>
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="inventory.html"><i class="fas fa-boxes-stacked"></i> Inventory</a>
            <a class="active" href="allocation.html"><i class="fas fa-share-nodes"></i> Allocation</a>
            <a href="scan.html"><i class="fas fa-camera"></i> Scan Barcode</a>
            <a href="barcode-generator.html"><i class="fas fa-barcode"></i> Barcode</a>
            <a href="reports.html"><i class="fas fa-file-export"></i> Reports</a>
            <a href="#" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <header class="page-header"><h1>Allocate Inventory</h1></header>
        <section class="panel">
            <form id="allocationForm" class="grid two">
                <label>Inventory <select id="inventoryId" required></select></label>
                <label>Department <select id="departmentId" required></select></label>
                <label>Quantity <input id="allocQuantity" type="number" min="1" value="1" required></label>
                <div class="actions"><button type="submit"><i class="fa-solid fa-share"></i> Allocate</button></div>
            </form>
        </section>
        <br>
        <div class="table-wrap"><table><thead><tr><th>Item</th><th>Department</th><th>Quantity</th><th>Status</th><th>Date</th></tr></thead><tbody id="allocationRows"></tbody></table></div>
    </main>
</div>
<script src="../js/api.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
