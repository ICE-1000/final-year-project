<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Department Registrations</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-im1">
<div class="app-layout">
    <aside class="sidebar">
        <div class="logo">IMS</div>
        <nav>
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="inventory.html"><i class="fas fa-boxes-stacked"></i> Inventory</a>
            <a href="allocation.html"><i class="fas fa-share-nodes"></i> Allocation</a>
            <a href="requests.html"><i class="fas fa-list"></i> Requests</a>
            <a href="departments.html"><i class="fas fa-building"></i> Departments</a>
            <a href="users.html"><i class="fas fa-users"></i> Users</a>
            <a class="active" href="registrations.html"><i class="fas fa-user-check"></i> Dept Approvals</a>
            <a href="#" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <header class="page-header"><h1>Pending Department Registrations</h1></header>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Department Name</th><th>Code</th><th>Username</th><th>Email</th><th>Requested On</th><th>Actions</th></tr>
                </thead>
                <tbody id="pendingRows">
                    <tr><td colspan="6">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script src="../js/api.js"></script>
<script>
    requireAuth('ADMIN');

    async function loadPending() {
        const tbody = document.getElementById('pendingRows');
        try {
            const registrations = await api('/admin/registrations');
            if (registrations.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">No pending registrations.</td></tr>';
                return;
            }
            tbody.innerHTML = registrations.map(reg => `
                <tr>
                    <td>${escapeHtml(reg.departmentName)}</td>
                    <td>${escapeHtml(reg.departmentCode)}</td>
                    <td>${escapeHtml(reg.username)}</td>
                    <td>${escapeHtml(reg.email)}</td>
                    <td>${new Date(reg.createdAt).toLocaleString()}</td>
                    <td class="actions">
                        <button class="approve-btn" data-id="${reg.id}">Approve</button>
                        <button class="reject-btn" data-id="${reg.id}">Reject</button>
                    </td>
                </tr>
            `).join('');

            document.querySelectorAll('.approve-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await api(`/admin/registrations/${btn.dataset.id}/approve`, { method: 'POST' });
                    loadPending();
                });
            });
            document.querySelectorAll('.reject-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const reason = prompt('Enter rejection reason:');
                    if (reason && reason.trim()) {
                        await api(`/admin/registrations/${btn.dataset.id}/reject?reason=${encodeURIComponent(reason)}`, { method: 'POST' });
                        loadPending();
                    }
                });
            });
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="6">Error: ${escapeHtml(err.message)}</td></tr>`;
        }
    }
    loadPending();
</script>
</body>
</html>
