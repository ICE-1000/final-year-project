<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="bg-im1">
<div class="app-layout">
    <aside class="sidebar">
        <div class="logo">IMS</div>
        <nav>
            <a class="active" href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="inventory.html"><i class="fas fa-boxes-stacked"></i> Inventory</a>
            <a href="allocation.html"><i class="fas fa-share-nodes"></i> Allocation</a>
             <a href="registrations.html"><i class="fas fa-share-nodes"></i> Registration requests</a>
            <a href="requests.html"><i class="fas fa-list"></i>Inventory Requests</a>
            <a href="departments.html"><i class="fas fa-boxes-stacked"></i> Departments</a>
            <a href="users.html"><i class="fas fa-boxes-stacked"></i> Users</a>
            <a href="scan.html"><i class="fas fa-camera"></i> Scan Barcode</a>
            <a href="barcode-generator.html"><i class="fas fa-barcode"></i> Barcode</a>
            <a href="reports.html"><i class="fas fa-file-export"></i> Reports</a>
            <a href="#" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <header class="page-header"><h1>Dashboard</h1></header>
        <section class="stats-cards">
            <div class="card"><h3>Total Inventory</h3><p id="totalInv">0</p></div>
            <div class="card"><h3>Available</h3><p id="availableInv">0</p></div>
            <div class="card"><h3>Allocated</h3><p id="allocInv">0</p></div>
            <div class="card"><h3>Low Stock</h3><p id="lowStock">0</p></div>
        </section>
        <section class="panel">
            <h2>Recent Inventory</h2>
            <div class="table-wrap"><table><thead><tr><th>Barcode</th><th>Name</th><th>Qty</th><th>Available</th><th>Status</th></tr></thead><tbody id="recentRows"></tbody></table></div>
        </section>
    </main>
</div>
<script src="../js/api.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
